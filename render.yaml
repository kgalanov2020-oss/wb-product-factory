services:
  - type: web
    name: wb-product-factory-api
    runtime: docker
    plan: free
    dockerfilePath: ./dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_MPSTATS_TABLE
        value: mpstats_collections
      - key: SUPABASE_PRODUCT_CONTENT_JOBS_TABLE
        value: product_content_jobs
      - key: SUPABASE_PRODUCT_CONTENT_ACTIONS_TABLE
        value: product_content_actions
      - key: SUPABASE_SUPPLIER_PRODUCTS_TABLE
        value: supplier_products
      - key: SUPABASE_PRODUCT_ANALYSES_TABLE
        value: product_analyses
      - key: MPSTATS_BASE_URL
        value: https://mpstats.io
      - key: MPSTATS_LOGIN_URL
        value: https://mpstats.io/login
      - key: MPSTATS_SEARCH_URL
        value: https://mpstats.io/wb/search
      - key: MPSTATS_HEADLESS
        value: "true"
      - key: MPSTATS_TIMEOUT_MS
        value: "30000"
      - key: MPSTATS_STORAGE_STATE_PATH
        value: /tmp/mpstats-state.json
      - key: MPSTATS_EMAIL
        sync: false
      - key: MPSTATS_PASSWORD
        sync: false
      - key: AIDENTIKA_BASE_URL
        value: https://api.aidentika.com/api/v1/public
      - key: AIDENTIKA_API_KEY
        sync: false
  - type: web
    name: wb-product-factory-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://wb-product-factory-api.onrender.com
